<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Kingsofas</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <section class="container py-5" style="margin-top: 100px;">
        <div class="row">
            <div class="col-md-6 mb-4">
                <img id="p-image" src="" class="img-fluid rounded shadow" alt="Loading...">
            </div>
            
            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" id="p-breadcrumb">Product</li>
                    </ol>
                </nav>
                
                <h1 id="p-name" class="display-5 fw-bold">Loading...</h1>
                <p class="text-muted">Product ID: <span id="p-id"></span></p>
                <h3 id="p-price" class="text-danger my-4">0 VND</h3>
                
                <div class="my-4">
                    <h5>Description:</h5>
                    <p id="p-desc" class="lead text-secondary">Please wait while we fetch product details...</p>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <input type="number" id="p-quantity" class="form-control" value="1" min="1" style="width: 80px;">
                    <button id="add-to-cart-btn" class="btn btn-primary btn-lg">Add to Cart</button>
                </div>
                
                <p class="mt-3 text-success">Stock available: <span id="p-stock">0</span></p>
            </div>
        </div>
    </section>

    <script type="module" src="../js/ProductDetail.js"></script>
</body>
</html>
