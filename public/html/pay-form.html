<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet"  href="../css/pay-form.css">
    <link rel="stylesheet" href="../css/AI-function.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <a class="btn btn-secondary" href="cart.html">
        <i class="bi bi-chevron-left"></i>
    </a>

    <div class="pay-container">
        <h1>Payment</h1>

        <div class="qr-wrapper">
            <img id="qr-image"
                src="https://img.vietqr.io/image/970415-99999999999999-compact.png?&addInfo=Please pay the orders and correct money.&accountName=King_sofas"
                alt="QR-Code-Payment" class="qr-display">
        </div>
        <div class="address-group">
            <h3 id="title-address" class="address-label">Enter your address to buy:</h3>
            <input id="address" class="address-field" type="text" placeholder="Enter your address">
            <div id="address-suggestions" class="suggestions-container"></div>
        </div>
        <span id="output_money">Total:</span><br>

        <div class="confirm-container">
            <button id="confirmed-sent">
                <i class="fas fa-check-circle"></i>
                I have sent money.
            </button>
            <p class="note" id="note">Please wait until admin confirm...</p>
        </div>
    </div>
    <button class="btn btn-primary chat-launcher" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-labelledby="geminiChatModalLabel" aria-hidden="true"
        data-bs-backdrop="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="geminiChatModalLabel">
                        <i class="bi bi-stars"></i> Kingsofas AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content">
                    <div class="message model">Hi, I am your AI assistant for website Sofas-king. I can support both
                        English and Vietnamese.</div>
                </div>

                <div class="modal-footer p-2">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control" placeholder="Ask about sofas, orders..."
                            aria-label="Message">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/AI-function.js"></script>
    <script type="module" src="../js/API.js"></script>
    <script type="module" src="../js/pay.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=Your_site_key"></script>
    <script type="module" src="../js/Security.js"></script>
</body>

</html>
