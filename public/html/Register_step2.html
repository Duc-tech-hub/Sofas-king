<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Setup - Step 2</title>
    <link rel="stylesheet" href="../css/Register_step2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/AI-function.css" />
</head>

<body>
    <a aria-label="Go back" class="btn-back-global" href="register.html">
        <i class="bi bi-chevron-left"></i>
    </a>
    <div class="security-container">
    <div class="slim-progress-container">
        <div class="slim-progress-bar"></div>
    </div>
    <p class="step-label">Step 2 of 2: Security Verification</p>

    <form id="security-form" class="security-form">
        <h2>Security Setup</h2>
        <p class="subtitle">Set up a recovery question to protect your account access.</p>
        <div class="input-group-custom">
            <label for="security-answer">Your email</label>
            <input type="text" id="security-answer" placeholder="Enter your recovery email" required>
        </div>
        <button type="submit" class="btn-complete">Complete Registration</button>

        <div class="security-footer">
            <i class="bi bi-shield-lock-fill"></i>
            <span>This email is required to login your account when you forgot password.</span>
        </div>
    </form>
    </div>
    <button class="btn btn-primary chat-launcher" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-labelledby="geminiChatModalLabel" aria-hidden="true"
        data-bs-backdrop="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="geminiChatModalLabel">
                        <i class="bi bi-stars"></i> Kingsofas AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content">
                    <div class="message model">Hi, I am your AI assistant for website Sofas-king. I can support both
                        English and Vietnamese.</div>
                </div>

                <div class="modal-footer p-2">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control" placeholder="Ask about sofas, orders..."
                            aria-label="Message">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/Register_step2.js"></script>
</body>

</html>
