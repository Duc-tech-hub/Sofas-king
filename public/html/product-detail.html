<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Kingsofas</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/AI-function.css" />
</head>
<body>
    <section class="container py-5" style="margin-top: 100px;">
        <div class="row">
            <div class="col-md-6 mb-4">
                <img id="p-image" src="" class="img-fluid rounded shadow" alt="Loading...">
            </div>
            
            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active" id="p-breadcrumb">Product</li>
                    </ol>
                </nav>
                
                <h1 id="p-name" class="display-5 fw-bold">Loading...</h1>
                <p class="text-muted">Product ID: <span id="p-id"></span></p>
                <h3 id="p-price" class="text-danger my-4">0 VND</h3>
                
                <div class="my-4">
                    <h5>Description:</h5>
                    <p id="p-desc" class="lead text-secondary">Please wait while we fetch product details...</p>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <input type="number" id="p-quantity" class="form-control" value="1" min="1" style="width: 80px;">
                    <button id="add-to-cart-btn" class="btn btn-primary btn-lg">Add to Cart</button>
                </div>
                
                <p class="mt-3 text-success">Stock available: <span id="p-stock">0</span></p>
            </div>
        </div>
    </section>
    <button class="btn btn-primary chat-launcher" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-labelledby="geminiChatModalLabel" aria-hidden="true"
        data-bs-backdrop="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="geminiChatModalLabel">
                        <i class="bi bi-stars"></i> Kingsofas AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content">
                    <div class="message model">Hi, I am your AI assistant for website Sofas-king. I can support both
                        English and Vietnamese.</div>
                </div>

                <div class="modal-footer p-2">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control" placeholder="Ask about sofas, orders..."
                            aria-label="Message">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script type="module" src="../js/ProductDetail.js"></script>
</body>
</html>
