<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

    <link rel="stylesheet" type="text/css" rel="noopener" target="_blank" href="../css/Adminpanel.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <a aria-label="Go back" class="btn btn-secondary" href="index.html">
        <i class="bi bi-chevron-left"></i>
    </a>
    <h1>Welcome to Admin Control Panel</h1>
    <div class="Sections">
        <div class="manage">
            <h3>Manage accounts</h3>
            <form id="form-account"><input type="text" placeholder="🔍 Search here..." class="input"
                    id="search-account"></form>
            <button class="button" id="select-account">Select</button>
            <button class="button-hide btn-complete" id="enable-account">Unlock</button>
            <button class="button-hide btn-delete" id="disable-account">Lock</button>
        </div>
        <div class="output" id="output-box-accouts"></div>
    </div>
    <div class="Sections">
        <div class="manage">
            <h3>Manage comments</h3>
            <input type="text" placeholder="🔍 Search here..." class="input" id="search-comment">
            <button class="button" id="select-comment">Select</button>
            <button class="button-hide btn-delete" id="remove-comment">Remove</button>
        </div>
        <div class="output" id="output-box-comments"></div>
    </div>
    <div class="Sections">
        <div class="manage">
            <h3>Manage orders</h3>
            <button class="button" id="select-order">Select</button>
            <button class="button-hide btn-complete" id="accept-order" style="display: none;">Accept</button>
            <button class="button-hide btn-delete" id="deny-order" style="display: none;">Deny</button>
        </div>
        <div class="output" id="output-box-orders"></div>
    </div>
    <section class="admin-shipping-wrapper">
        <div class="shipping-header">
            <div class="header-left">
                <h2>Shipping & Delivery Management</h2>
                <div class="shipping-controls">
                    <button class="button" id="select-shipping">Select</button>
                    <button class="button-hide btn-complete" id="complete-shipping">Complete Selected</button>
                    <button class="button-hide btn-delete" id="delete-shipping">Remove Selected</button>
                </div>
            </div>

            <div class="shipping-stats">
                <div class="stat-card">
                    <span class="stat-label">TOTAL ORDERS</span>
                    <span id="total-orders-count" class="stat-value">0</span>
                </div>
                <div class="stat-card pending">
                    <span class="stat-label">PENDING DELIVERY</span>
                    <span id="pending-delivery-count" class="stat-value">0</span>
                </div>
            </div>
        </div>

        <div id="shipping-container" class="shipping-grid">
            <div class="loading-state">
                <p>Loading global orders...</p>
            </div>
        </div>
    </section>
    <div class="Sections">
        <div class="manage">
            <h3>Manage Products</h3>
            <div class="d-flex gap-2 mb-3">
                <input type="text" placeholder="🔍 Search product..." class="input" id="search-product">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#productModal" id="btn-add-new">
                    <i class="bi bi-plus-circle"></i> Add New
                </button>
            </div>
            <button class="button" id="select-product">Select</button>
            <button class="button-hide btn-delete" id="delete-product">Delete Selected</button>
        </div>
        <div class="output" id="output-box-products">
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add/Edit Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="product-form">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="p-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price (VND)</label>
                            <input type="number" id="p-price" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" id="p-stock" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Product Image</label>
                            <input type="file" id="p-image-file" class="form-control" accept="image/*">

                            <input type="hidden" id="p-image">

                            <div id="upload-status" class="form-text text-info"></div>

                            <img id="img-preview" src=""
                                style="max-width: 100px; margin-top: 10px; display: none; border-radius: 5px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="p-desc" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.google.com/recaptcha/api.js?render=Your_recapcha_provider"></script>
    <script type="module" src="../js/Security.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/Adminpanel-part1.js"></script>
    <script type="module" src="../js/Adminpanel-part2.js"></script>
    <script type="module" src="../js/Adminpanel-part3.js"></script>
    <script type="module" src="../js/Adminpanel-part4.js"></script>
    <script type="module" src="../js/Adminpanel-part5.js"></script>
</body>

</html>
