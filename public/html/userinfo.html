<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userinfo</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

    <link rel="stylesheet" href="../css/Userinfo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="button">
        <a class="btn btn-secondary" href="index.html">
            <i class="bi bi-chevron-left"></i>
        </a>
    </div>
    <div class="infocontainer">
        <h1>User information</h1>
        <h3>Username:</h3>
        <span class="inputinfo" id="inputinfo_username"></span>

        <h3>Password:</h3>
        <span>Password cannot be shown.</span>
        <div class="address-group">
        <h3>Address:</h3>
        <input type="text" class="inputinfo" id="address" placeholder="Enter your address...">
        <div id="address-suggestions" class="suggestions-container"></div>
        </div>

        <h3>Phone Number:</h3>
        <input type="text" class="inputinfo" id="inputinfo_phone" placeholder="Enter your phone...">

        <button class="Button btn-update" id="update_btn">Update Info</button>
        <button class="Button btn-logout" id="logoutbutton">Log out</button>
    </div>

    <script src="https://www.google.com/recaptcha/api.js?render=Your_recapcha_provider"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script type="module" src="../js/Manage_auth.js"></script>
    <script type="module" src="../js/userinfo.js"></script>
    <script type="module" src="../js/API.js"></script>
    <script type="module" src="../js/Security.js"></script>
</body>

</html>
