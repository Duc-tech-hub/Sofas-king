<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

    <link rel="stylesheet" href="../css/Userinfo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="button">
        <a class="btn btn-secondary" href="index.html">
            <i class="bi bi-chevron-left"></i>
        </a>
    </div>

    <div class="infocontainer">
        <h1>User Information</h1>

        <h3>Username:</h3>
        <input type="text" class="inputinfo" id="inputinfo_username" placeholder="Enter your username...">

        <div class="info-group" id="password-section" style="margin-top: 20px; margin-bottom: 20px;">
            <h3>Password:</h3>

            <div id="pass-google-msg" style="display: none;">
                <span class="text-muted"><i class="bi bi-google"></i> Password managed by Google.</span>
            </div>

            <div id="pass-normal-action" style="display: none;">
                <div class="d-flex align-items-center gap-2">
                    <span class="placeholder-pass"
                        style="letter-spacing: 3px; background: #eee; padding: 5px 10px; border-radius: 5px;">••••••••</span>
                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                        data-bs-target="#changePassModal">
                        <i class="bi bi-pencil-square"></i> Change Password
                    </button>
                </div>
            </div>
        </div>

        <div class="address-group">
            <h3>Address:</h3>
            <input type="text" class="inputinfo" id="address" placeholder="Enter your address...">
            <div id="address-suggestions" class="suggestions-container"></div>
        </div>

        <h3>Phone Number:</h3>
        <input type="text" class="inputinfo" id="inputinfo_phone" placeholder="Enter your phone...">

        <div style="margin-top: 30px;">
            <button class="Button btn-update" id="update_btn">Update Info</button>
            <button class="Button btn-logout" id="logoutbutton">Log out</button>
        </div>
    </div>

    <div class="modal fade" id="changePassModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Security Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="change-password-form">
                        <div id="re-auth-container">
                            <label class="form-label">Current Password</label>
                            <div class="input-group mb-2">
                                <input type="password" id="current-password-input" class="form-control"
                                    placeholder="Enter current password" required>
                                <button class="btn btn-outline-secondary toggle-pass" type="button"
                                    data-target="current-password-input">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="text-end mb-3">
                                <a href="#" id="link-forgot-pass"
                                    style="font-size: 0.85rem; text-decoration: none;">Forgot password?</a>
                            </div>
                        </div>

                        <hr>

                        <label class="form-label">New Password</label>
                        <div class="input-group mb-3">
                            <input type="password" id="new-password-input" class="form-control"
                                placeholder="Min 6 characters" required minlength="6">
                            <button class="btn btn-outline-secondary toggle-pass" type="button"
                                data-target="new-password-input">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <label class="form-label">Confirm New Password</label>
                        <div class="input-group mb-3">
                            <input type="password" id="confirm-password-input" class="form-control"
                                placeholder="Repeat new password" required>
                            <button class="btn btn-outline-secondary toggle-pass" type="button"
                                data-target="confirm-password-input">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="btn-save-new-pass">Verify &
                            Update</button>
                    </form>

                    <div id="forgot-pass-section" style="display: none;">
                        <p class="text-primary fw-bold" id="display-question">Security Question</p>
                        <input type="text" id="forget-answer" class="form-control mb-3" placeholder="Your answer...">
                        <button type="button" class="btn btn-warning w-100" id="btn-verify-answer-info">Verify
                            Identity</button>
                        <button type="button" class="btn btn-link w-100 btn-sm mt-2" id="btn-back-to-change">Back to
                            login</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcD64osAAAAAGUBTHsgA4ohfn5pCwabUywaoemq"></script>
    <script type="module" src="../js/userinfo.js"></script>
    <script type="module" src="../js/API.js"></script>
    <script type="module" src="../js/Security.js"></script>
</body>

</html>
