<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/Account.css">
    <link rel="stylesheet" href="../css/AI-function.css" />
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <a aria-label="Go back" class="btn btn-secondary position-absolute top-0 start-0 m-3" href="login.html">
        <i class="bi bi-chevron-left"></i>
    </a>
    <div class="form">
        <h2>Continue with:</h2>
        <button id="googlemethod"> <img src="../image/Logogoogle.jpg" alt="Login with Google">
            <p>Login with Google</p>
        </button><br>
        <div class="address-group">
            <label for="address">Delivery address:</label>
            <input name="address" type="text" placeholder="Provide your delivery address here" id="address">
            <div id="address-suggestions" class="suggestions-container"></div>
        </div>
        <label for="Phone_number">Your phone number:</label>
        <input name="Phone_number" type="text" placeholder="Provide your phone number here" id="Phone_number">
    </div>
    <button class="btn btn-primary chat-launcher" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-labelledby="geminiChatModalLabel" aria-hidden="true"
        data-bs-backdrop="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="geminiChatModalLabel">
                        <i class="bi bi-stars"></i> Kingsofas AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content">
                    <div class="message model">Hi, I am your AI assistant for website Sofas-king. I can support both
                        English and Vietnamese.</div>
                </div>

                <div class="modal-footer p-2">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control" placeholder="Ask about sofas, orders..."
                            aria-label="Message">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script type="module" src="../js/Manage_auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/API.js"></script>
</body>

</html>
