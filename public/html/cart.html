<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Kingsofas</title>
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/AI-function.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
    <div class="p-3">
        <a aria-label="Go back" class="btn btn-outline-secondary shadow-sm" href="index.html">
            <i class="bi bi-chevron-left"></i> Back to Shop
        </a>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="cont" class="bg-white p-4 rounded-3 shadow-sm">
                    <h1 class="mb-4">Your Cart</h1>
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="cart-summary-box bg-white p-4 rounded-3 shadow-sm sticky-top" style="top: 20px;">
                    <h3 class="border-bottom pb-3 mb-3">Order Summary</h3>
                    
                    <div class="summary-item d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal:</span>
                        <strong id="subtotal-amount">0 VND</strong>
                    </div>
                    
                    <div class="summary-item d-flex justify-content-between mb-2">
                        <span class="text-muted">Shipping:</span>
                        <span class="text-success fw-bold">Free</span>
                    </div>

                    <hr>

                    <div class="summary-item total-row d-flex justify-content-between mb-4">
                        <span class="h5">Total:</span>
                        <span class="h5 text-primary" id="total-amount">0 VND</span>
                    </div>
                    
                    <button id="redirect" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                        <i class="bi bi-credit-card-2-back me-2"></i> PAY NOW
                    </button>
                    
                    <p class="text-center mt-3 small text-muted">
                        <i class="bi bi-shield-check"></i> Secure Checkout
                    </p>
                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary chat-launcher shadow-lg" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-stars"></i> Kingsofas AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
                    <div class="message model p-2 rounded mb-2 bg-light">
                        Hi, I am your AI assistant. How can I help you with your order?
                    </div>
                </div>

                <div class="modal-footer p-2 border-top">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control border-primary" placeholder="Ask about sofas...">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcD64osAAAAAGUBTHsgA4ohfn5pCwabUywaoemq"></script>
    <script type="module" src="../js/Security.js"></script>
    <script type="module" src="../js/cart.js"></script>
</body>

</html>
