<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../css/forget_pass.css">
    <link rel="stylesheet" href="../css/AI-function.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="forget-container">
        <a href="login.html"
            class="inline-flex items-center gap-2 px-4 py-2 bg-slate-50 text-slate-600 rounded-xl font-bold text-sm border border-slate-100 hover:bg-blue-50 hover:text-blue-600 hover:-translate-x-1 transition-all no-underline shadow-sm">
            <i class="bi bi-arrow-left"></i>
            Back to Login
        </a>
        <div class="forget-card">
            <div class="icon-header">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h2>Email-link login</h2>
            <p class="desc">Enter your email to receive an email link via your recovery email.</p>

            <form id="forget-form">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" id="forget-username" placeholder="Enter your email" required>
                    </div>
                </div>
                <button type="submit" id="btn-reset" class="btn-primary">Send Reset Link</button>
            </form>

            <div id="success-msg" class="hidden text-center mt-4">
                <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
                <h3>Check your Email!</h3>
                <p>A reset link has been sent to your registered recovery email.</p>
            </div>
        </div>
    </div>
    <button aria-label="AI Assistant button" class="btn btn-primary chat-launcher" data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-stars"></i> Sofas-king AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-grey" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
                    <div class="message model p-2 rounded mb-2 bg-light">
                        Hi, I am your AI assistant. How can I help you with your order?
                    </div>
                </div>
                <div id="quick-suggestions" class="p-2 d-flex flex-wrap gap-2 border-top bg-light">
                </div>

                <div class="modal-footer p-2 border-top">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control border-primary"
                            placeholder="Ask about sofas...">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script type="module" src="../js/Forget_pass.js"></script>
</body>

</html>
