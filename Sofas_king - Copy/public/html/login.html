<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/AI-function.css" />
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden">
    <div class="fixed top-6 left-6 z-[9999]">
        <a aria-label="Go back" href="index.html"
            class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 text-white rounded-2xl shadow-2xl hover:bg-blue-600 hover:-translate-x-1 active:scale-95 transition-all no-underline group border border-white/10">
            <i class="bi bi-chevron-left text-xl leading-none"></i>
        </a>
    </div>
    <div
        class="w-full max-w-[450px] bg-white rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] p-8 md:p-10 relative z-10 border border-slate-100">
        <form id="login-form" class="space-y-4">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-black text-slate-900 leading-none mb-2">Login</h2>
                <p class="text-sm text-slate-400 font-medium italic">Welcome back! Please enter your details.</p>
            </div>

            <div class="space-y-1">
                <label for="login-username" class="text-[12px] font-bold text-slate-500 uppercase ml-1">Email</label>
                <input type="email" id="login-username" placeholder="name@email.com" required
                    class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-medium text-slate-700">
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label for="login-password" class="text-[12px] font-bold text-slate-500 uppercase">Password</label>
                    <a href="Forget_pass.html" class="text-[11px] font-bold text-blue-600 no-underline">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Enter your password..." required
                        class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-medium text-slate-700">
                    <i class="bi bi-eye-slash btn-toggle-login absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer"
                        data-target="login-password"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <div class="space-y-1">
                    <label class="text-[12px] font-bold text-slate-500 uppercase ml-1">Address</label>
                    <input id="address"
                        class="w-full px-4 py-2 bg-slate-50 border-none rounded-xl text-[13px] font-medium" type="text"
                        placeholder="Street...">
                    <div id="address-suggestions" class="absolute z-20 mt-1 shadow-lg rounded-lg"></div>
                </div>
                <div class="space-y-1">
                    <label for="Phone_number" class="text-[12px] font-bold text-slate-500 uppercase ml-1">Phone</label>
                    <input type="tel" id="Phone_number" placeholder="0123..."
                        class="w-full px-4 py-2 bg-slate-50 border-none rounded-xl text-[13px] font-medium">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-blue-600 hover:-translate-y-1 active:scale-95 transition-all text-sm mt-4"
                id="btn-login">
                Sign In <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>

            <div
                class="flex items-center my-3 before:flex-1 before:h-px before:bg-slate-100 after:flex-1 after:h-px after:bg-slate-100 text-[10px] font-black text-slate-300 gap-3">
                OR</div>

            <a href="login-google.html"
                class="w-full py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all no-underline">
                <i class="bi bi-google text-slate-400"></i> Continue with Google
            </a>

            <p class="text-center text-[12px] font-medium text-slate-400 pt-3">
                New here? <a href="register.html" class="text-blue-600 no-underline font-bold">Register an
                    account</a>
            </p>
        </form>
    </div>
    <button aria-label="AI Assistant button" class="btn btn-primary chat-launcher" data-bs-toggle="modal"
        data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-stars"></i> Sofas-king AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-grey" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
                    <div class="message model p-2 rounded mb-2 bg-light">
                        Hi, I am your AI assistant. How can I help you with your order?
                    </div>
                </div>
                <div id="quick-suggestions" class="p-2 d-flex flex-wrap gap-2 border-top bg-light">
                </div>

                <div class="modal-footer p-2 border-top">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control border-primary"
                            placeholder="Ask about sofas...">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script type="module" src="../js/login.js"></script>
    <script type="module" src="../js/API.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=Your_firebase_appcheck_site_key"></script>
</body>

</html>
