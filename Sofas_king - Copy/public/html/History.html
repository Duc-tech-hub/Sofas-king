<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

  <link rel="stylesheet" href="../css/History.css">
  <link rel="stylesheet" href="../css/AI-function.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div class="w-full px-4 md:px-[3%] pt-16 mb-4">
    <a aria-label="Go back" href="index.html"
      class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 text-white rounded-2xl shadow-lg hover:bg-blue-600 hover:-translate-x-1 active:scale-95 transition-all no-underline group">
      <i class="bi bi-chevron-left text-xl leading-none"></i>
    </a>
  </div>
  <h1>History</h1>
  <div id="history-container"></div>
  <butto aria-label="AI Assistant button" class="btn btn-primary chat-launcher" data-bs-toggle="modal"
    data-bs-target="#geminiChatModal">
    <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">
              <i class="bi bi-stars"></i> Sofas-king AI Assistant
            </h5>
            <button type="button" class="btn-close btn-close-grey" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
            <div class="message model p-2 rounded mb-2 bg-light">
              Hi, I am your AI assistant. How can I help you with your order?
            </div>
          </div>
          <div id="quick-suggestions" class="p-2 d-flex flex-wrap gap-2 border-top bg-light">
          </div>

          <div class="modal-footer p-2 border-top">
            <div class="input-group">
              <input type="text" id="ai-input" class="form-control border-primary" placeholder="Ask about sofas...">
              <button class="btn btn-primary" type="button" id="ai-send">
                <i class="bi bi-send"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=Your_firebase_appcheck_site_key"></script>
    <script type="module" src="../js/History.js"></script>
    <script type="module" src="../js/Website_management.js"></script>
</body>

</html>
