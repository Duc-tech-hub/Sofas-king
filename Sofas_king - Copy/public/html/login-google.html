<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/Account.css">
    <link rel="stylesheet" href="../css/AI-function.css" />
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_50%,#ebf2ff_0%,transparent_50%)]">
        <div class="w-full px-4 md:px-[3%] pt-16 mb-4">
            <a aria-label="Go back" href="login.html"
                class="inline-flex items-center justify-center w-12 h-12 bg-slate-900 text-white rounded-2xl shadow-lg hover:bg-blue-600 hover:-translate-x-1 active:scale-95 transition-all no-underline group">
                <i class="bi bi-chevron-left text-xl leading-none"></i>
            </a>
        </div>
    </div>
    <div
        class="w-full max-w-[420px] bg-white rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] p-8 md:p-10 relative z-10 border border-slate-100">

        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 mb-2">Continue with</h2>
            <p class="text-sm text-slate-400 font-medium">Quick access to your account</p>
        </div>

        <button id="googlemethod"
            class="w-full py-4 bg-white border-2 border-slate-100 rounded-2xl flex items-center justify-center gap-3 font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-200 hover:-translate-y-1 active:scale-95 transition-all shadow-sm">
            <i class="bi bi-google text-blue-600 text-xl"></i>
            <span>Sign in with Google</span>
        </button>

        <div
            class="flex items-center my-6 before:flex-1 before:h-px before:bg-slate-100 after:flex-1 after:h-px after:bg-slate-100 text-[10px] font-black text-slate-300 gap-3 uppercase tracking-widest">
            Additional Info
        </div>

        <div class="space-y-4">
            <div class="address-group space-y-1.5">
                <label for="address" class="text-[12px] font-bold text-slate-500 uppercase ml-1">Delivery
                    address</label>
                <div class="relative">
                    <input name="address" type="text" id="address" placeholder="Where should we send your sofa?"
                        class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-medium text-slate-700">
                    <div id="address-suggestions"
                        class="absolute w-full z-20 mt-1 bg-white shadow-xl rounded-xl overflow-hidden text-sm"></div>
                </div>
            </div>

            <div class="space-y-1.5">
                <label for="Phone_number" class="text-[12px] font-bold text-slate-500 uppercase ml-1">Your phone
                    number</label>
                <input name="Phone_number" type="text" id="Phone_number" placeholder="e.g. 0912 345 678"
                    class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-medium text-slate-700">
            </div>
        </div>

        <p class="text-center text-[11px] text-slate-400 mt-8 font-medium leading-relaxed">
            Secure login powered by Firebase.<br>By continuing, you agree to our <a href="#"
                class="text-blue-600 no-underline">Terms</a>.
        </p>
    </div>

    <button aria-label="AI Assistant button"
        class="chat-launcher fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl hover:scale-110 transition-all flex items-center justify-center z-50 border-4 border-white"
        data-bs-toggle="modal" data-bs-target="#geminiChatModal">
        <i class="bi bi-robot text-xl"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-stars"></i> Sofas-king AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-grey" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
                    <div class="message model p-2 rounded mb-2 bg-light">
                        Hi, I am your AI assistant. How can I help you with your order?
                    </div>
                </div>
                <div id="quick-suggestions" class="p-2 d-flex flex-wrap gap-2 border-top bg-light">
                </div>

                <div class="modal-footer p-2 border-top">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control border-primary"
                            placeholder="Ask about sofas...">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script type="module" src="../js/Manage_auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/API.js"></script>
</body>

</html>
