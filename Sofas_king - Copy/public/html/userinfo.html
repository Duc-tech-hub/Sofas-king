<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

    <link rel="stylesheet" href="../css/Userinfo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/AI-function.css" />
</head>

<body>
    <div class="fixed top-4 left-4 z-[9999]">
        <a aria-label="Go back" href="index.html"
            class="inline-flex items-center justify-center w-10 h-10 bg-slate-900 text-white rounded-xl shadow-xl hover:bg-blue-600 transition-all no-underline">
            <i class="bi bi-chevron-left"></i>
        </a>
    </div>

    <div
        class="infocontainer w-full max-w-[550px] bg-white rounded-[2rem] shadow-2xl p-6 md:p-10 border border-slate-50 relative overflow-hidden mx-auto">
        <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-full -mr-12 -mt-12 opacity-50"></div>

        <div class="relative z-10">
            <h1 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-2">
                <i class="bi bi-person-circle text-blue-600"></i> My Profile
            </h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Username</label>
                    <input type="text"
                        class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl font-bold text-slate-700 text-sm"
                        id="inputinfo_username" placeholder="Username...">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email</label>
                    <div class="relative">
                        <input type="email" id="inputinfo_email" readonly
                            class="w-full px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 text-sm cursor-not-allowed">
                        <i class="bi bi-lock-fill absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    </div>
                </div>

                <div class="md:col-span-2 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block">Security &
                        Password</label>

                    <div id="pass-google-msg" style="display: none;"
                        class="flex items-center gap-3 text-sm font-bold text-blue-600 bg-white p-2 rounded-lg shadow-sm">
                        <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-md">
                            <i class="bi bi-google"></i>
                        </div>
                        <span class="text-xs">Managed by Google Auth</span>
                    </div>

                    <div id="pass-normal-action" style="display: none;" class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <div
                                class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center text-slate-400">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                            <span class="font-black tracking-[3px] text-slate-300 text-sm">••••••••</span>
                        </div>
                        <button type="button"
                            class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-black text-blue-600 shadow-sm"
                            data-bs-toggle="modal" data-bs-target="#changePassModal">
                            CHANGE
                        </button>
                    </div>
                </div>

                <div class="md:col-span-2 space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Delivery Address</label>
                    <input type="text" id="address"
                        class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl font-bold text-sm"
                        placeholder="Address...">
                </div>

                <div class="md:col-span-2 space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Phone Number</label>
                    <input type="text" id="inputinfo_phone"
                        class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl font-bold text-sm"
                        placeholder="Phone...">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button
                    class="flex-[2] py-3.5 bg-slate-900 text-white rounded-xl font-black text-xs shadow-lg hover:bg-blue-600 transition-all"
                    id="update_btn">
                    UPDATE INFO
                </button>
                <button
                    class="flex-1 py-3.5 bg-white border border-slate-200 text-red-500 rounded-xl font-black text-xs hover:bg-red-50 transition-all"
                    id="logoutbutton">
                    LOGOUT
                </button>
            </div>
        </div>
    </div>
    <div class="modal fade" id="changePassModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-[2.5rem] shadow-2xl overflow-hidden">
                <div class="modal-header bg-slate-900 text-white p-6 border-0">
                    <div class="flex flex-col">
                        <h5 class="modal-title font-black text-xl">Security Settings</h5>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-0">Update your account
                            password</p>
                    </div>
                    <button type="button" class="btn-close btn-close-grey shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body p-6 bg-slate-50">
                    <form id="change-password-form" class="space-y-4">
                        <div id="re-auth-container" class="space-y-3">
                            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 mb-4">
                                <p class="text-xs font-bold text-blue-700 mb-0">
                                    <i class="bi bi-info-circle me-1"></i> For your security, please verify your current
                                    password.
                                </p>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Current
                                    Password</label>
                                <div
                                    class="input-group bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
                                    <input type="password" id="current-password-input"
                                        class="form-control border-0 shadow-none px-3 py-2.5 text-sm"
                                        placeholder="Enter current password" required>
                                    <button class="btn border-0 text-slate-400 toggle-pass" type="button"
                                        data-target="current-password-input">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="text-end">
                                    <a href="#" id="link-forgot-pass"
                                        class="text-[11px] font-black text-blue-600 no-underline hover:underline">FORGOT
                                        PASSWORD?</a>
                                </div>
                            </div>
                        </div>

                        <div class="h-px bg-slate-200 my-4"></div>

                        <div class="space-y-4">
                            <div class="space-y-1.5">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1">New Password</label>
                                <div
                                    class="input-group bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
                                    <input type="password" id="new-password-input"
                                        class="form-control border-0 shadow-none px-3 py-2.5 text-sm"
                                        placeholder="Min 6 characters" required minlength="6">
                                    <button class="btn border-0 text-slate-400 toggle-pass" type="button"
                                        data-target="new-password-input">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Confirm New
                                    Password</label>
                                <div
                                    class="input-group bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
                                    <input type="password" id="confirm-password-input"
                                        class="form-control border-0 shadow-none px-3 py-2.5 text-sm"
                                        placeholder="Repeat new password" required>
                                    <button class="btn border-0 text-slate-400 toggle-pass" type="button"
                                        data-target="confirm-password-input">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-lg hover:bg-blue-700 transition-all mt-6"
                            id="btn-save-new-pass">
                            VERIFY & UPDATE
                        </button>
                    </form>

                    <div id="forgot-pass-section" style="display: none;"
                        class="space-y-4 animate-in fade-in duration-300">
                        <div class="text-center mb-6">
                            <div
                                class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-100">
                                <i class="bi bi-patch-question text-3xl"></i>
                            </div>
                            <h6 class="font-black text-slate-800">Security Question</h6>
                            <p class="text-xs text-slate-500" id="display-question">Loding question...</p>
                        </div>

                        <input type="text" id="forget-answer"
                            class="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-amber-500/20 transition-all"
                            placeholder="Your answer...">

                        <button type="button"
                            class="w-full py-4 bg-amber-500 text-white rounded-2xl font-black text-sm shadow-lg hover:bg-amber-600 transition-all"
                            id="btn-verify-answer-info">
                            VERIFY IDENTITY
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button aria-label="AI Assistant button" class="btn btn-primary chat-launcher" data-bs-toggle="modal"
        data-bs-target="#geminiChatModal">
        <i class="bi bi-robot"></i>
    </button>

    <div class="modal fade" id="geminiChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-stars"></i> Sofas-king AI Assistant
                    </h5>
                    <button type="button" class="btn-close btn-close-grey" data-bs-dismiss="modal"
                        arias-label="Close"></button>
                </div>

                <div class="modal-body d-flex flex-column" id="chat-content" style="height: 400px; overflow-y: auto;">
                    <div class="message model p-2 rounded mb-2 bg-light">
                        Hi, I am your AI assistant. How can I help you with your order?
                    </div>
                </div>
                <div id="quick-suggestions" class="p-2 d-flex flex-wrap gap-2 border-top bg-light">
                </div>

                <div class="modal-footer p-2 border-top">
                    <div class="input-group">
                        <input type="text" id="ai-input" class="form-control border-primary"
                            placeholder="Ask about sofas...">
                        <button class="btn btn-primary" type="button" id="ai-send">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="../js/AI-function.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=Your_firebase_appcheck_site_key"></script>
    <script type="module" src="../js/userinfo.js"></script>
    <script type="module" src="../js/API.js"></script>
    <script type="module" src="../js/Website_management.js"></script>
</body>

</html>
